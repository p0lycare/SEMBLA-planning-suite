<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<style>
  .t{fill:#1d1d1b;} .s{fill:#6b6862;}
  .ax{stroke:#9a978f;stroke-width:1.2;}
  .grid{stroke:#e7e5e0;stroke-width:1;}
  .classic{fill:none;stroke:#9a978f;stroke-width:2.4;stroke-dasharray:6 4;}
  .sembla{fill:none;stroke:#1f6feb;stroke-width:3;}
  .gain{fill:#1f6feb;opacity:.12;}
  .cluster{fill:#f1efec;stroke:#e3e1dc;stroke-width:1;}
  .bar{fill:#1f6feb;}
  .bar2{fill:#5b8def;}
  .spine{fill:#13202e;}
  .dot{fill:#1f6feb;}
</style>
<rect x="0" y="0" width="1000" height="600" fill="#ffffff"/>
<text x="50" y="26" class="t" font-size="13.5" font-weight="700">SEMBLA-Planungsprozess — Module über die Leistungsphasen &amp; Vorverlagerung der Planungstiefe</text>

<g class="grid">
  <line x1="203.3" y1="44" x2="203.3" y2="512"/><line x1="296.7" y1="44" x2="296.7" y2="512"/>
  <line x1="390" y1="44" x2="390" y2="512"/><line x1="483.3" y1="44" x2="483.3" y2="512"/>
  <line x1="576.7" y1="44" x2="576.7" y2="512"/><line x1="670" y1="44" x2="670" y2="512"/>
  <line x1="763.3" y1="44" x2="763.3" y2="512"/><line x1="856.7" y1="44" x2="856.7" y2="512"/>
</g>

<line class="ax" x1="110" y1="205" x2="950" y2="205"/>
<line class="ax" x1="110" y1="205" x2="110" y2="58"/>
<text x="64" y="135" class="s" font-size="11" transform="rotate(-90 64 135)" text-anchor="middle">Planungstiefe</text>
<text x="100" y="64" class="s" font-size="9.5" text-anchor="end">hoch</text>
<text x="100" y="203" class="s" font-size="9.5" text-anchor="end">gering</text>

<polygon class="gain" points="156.7,191 250,138 343.3,93 436.7,82 530,72 623.3,69 716.7,68 810,65 903.3,65 810,65 716.7,76 623.3,79 530,86 436.7,160 343.3,170 250,188 156.7,198"/>
<polyline class="classic" points="156.7,198 250,188 343.3,170 436.7,160 530,86 623.3,79 716.7,76 810,65 903.3,65"/>
<polyline class="sembla" points="156.7,191 250,138 343.3,93 436.7,82 530,72 623.3,69 716.7,68 810,65 903.3,65"/>
<g class="dot"><circle cx="250" cy="138" r="3"/><circle cx="343.3" cy="93" r="3"/><circle cx="436.7" cy="82" r="3"/></g>

<defs><marker id="al" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto"><path d="M9,0 L0,4.5 L9,9 Z" fill="#1f6feb"/></marker></defs>
<line x1="560" y1="116" x2="330" y2="116" stroke="#1f6feb" stroke-width="1.6" marker-end="url(#al)"/>
<text x="448" y="109" class="t" font-size="11" font-weight="600" text-anchor="middle" fill="#1f6feb">Detail &amp; Festlegung wandern nach vorn</text>

<line x1="640" y1="178" x2="666" y2="178" class="sembla"/><text x="672" y="182" class="s" font-size="11">SEMBLA-System</text>
<line x1="790" y1="178" x2="816" y2="178" class="classic"/><text x="822" y="182" class="s" font-size="11">klassisch</text>

<rect class="cluster" x="110" y="214" width="186.7" height="18" rx="3"/><text x="203.3" y="226.5" class="s" font-size="10.5" text-anchor="middle">Bedarf · Vorplanung</text>
<rect class="cluster" x="296.7" y="214" width="186.6" height="18" rx="3"/><text x="390" y="226.5" class="s" font-size="10.5" text-anchor="middle">Entwurf · Genehmigung</text>
<rect class="cluster" x="483.3" y="214" width="280" height="18" rx="3"/><text x="623.3" y="226.5" class="s" font-size="10.5" text-anchor="middle">Ausführung · Vergabe</text>
<rect class="cluster" x="763.3" y="214" width="186.7" height="18" rx="3"/><text x="856.7" y="226.5" class="s" font-size="10.5" text-anchor="middle">Bau · Betrieb</text>
<g class="t" font-size="11" font-weight="700" text-anchor="middle">
  <text x="156.7" y="250">LP1</text><text x="250" y="250">LP2</text><text x="343.3" y="250">LP3</text>
  <text x="436.7" y="250">LP4</text><text x="530" y="250">LP5</text><text x="623.3" y="250">LP6</text>
  <text x="716.7" y="250">LP7</text><text x="810" y="250">LP8</text><text x="903.3" y="250">LP9</text>
</g>

<text x="50" y="280" class="s" font-size="11" font-weight="700" letter-spacing=".4px">MODUL-EINSATZ JE LEISTUNGSPHASE · 10 Module</text>
<g font-size="10.5" font-weight="600" fill="#ffffff">
  <rect class="bar"  x="203.3" y="290" width="373.4" height="16" rx="4"/><text x="211" y="301.5">Modul 1 · Wand planen &amp; auslegen (Wandelement)</text>
  <rect class="bar2" x="203.3" y="308" width="280"   height="16" rx="4"/><text x="211" y="319.5">Modul 8 · 3D-Vorschau</text>
  <rect class="bar2" x="296.7" y="326" width="373.3" height="16" rx="4"/><text x="304" y="337.5">Modul 3 · Statik (Anschlüsse · Hebezustand)</text>
  <rect class="bar2" x="296.7" y="344" width="466.6" height="16" rx="4"/><text x="304" y="355.5">Modul 2 · Verbinder / UK (je Seite)</text>
  <rect class="bar2" x="296.7" y="362" width="466.6" height="16" rx="4"/><text x="304" y="373.5">Latten + Dämmung (Innenausbau / Fassade)</text>
  <rect class="bar2" x="296.7" y="380" width="466.6" height="16" rx="4"/><text x="304" y="391.5">Modul 9 · Stückliste &amp; Kosten (Excel)</text>
  <rect class="bar"  x="203.3" y="398" width="653.4" height="16" rx="4"/><text x="211" y="409.5">Projekt-Manager · DXF / IFC (BIM) · übergreifend</text>
  <rect class="bar"  x="483.3" y="416" width="373.4" height="16" rx="4"/><text x="491" y="427.5">Modul 10 · Fertigungszeichnung (PDF)</text>
  <rect class="bar2" x="483.3" y="434" width="373.4" height="16" rx="4"/><text x="491" y="445.5">Modul 4 · Montageplanung</text>
  <rect class="bar"  x="576.7" y="452" width="280"   height="16" rx="4"/><text x="584" y="463.5">Roboter-Export · Vorfertigung</text>
</g>

<defs><marker id="au" markerWidth="9" markerHeight="9" refX="4.5" refY="2" orient="auto"><path d="M0,9 L4.5,0 L9,9 Z" fill="#9aa1aa"/></marker></defs>
<g stroke="#9aa1aa" stroke-width="1.4">
  <line x1="250" y1="513" x2="250" y2="476" marker-end="url(#au)"/>
  <line x1="436.7" y1="513" x2="436.7" y2="476" marker-end="url(#au)"/>
  <line x1="623.3" y1="513" x2="623.3" y2="476" marker-end="url(#au)"/>
  <line x1="810" y1="513" x2="810" y2="476" marker-end="url(#au)"/>
</g>
<rect class="spine" x="110" y="516" width="840" height="44" rx="8"/>
<text x="530" y="535" fill="#ffffff" font-size="13.5" font-weight="700" text-anchor="middle">Wandelement — Single Source of Truth</text>
<text x="530" y="551" fill="#aebfd0" font-size="11" text-anchor="middle">ein parametrisches Datenmodell speist Statik · Verbinder · Latten · Stückliste · Montage · 3D · BIM · Roboter · Fertigung</text>

<text x="110" y="584" class="s" font-size="10.5">Kernidee: Schon der erste Entwurf liefert das vollständige Wandelement — Ausführungstiefe entsteht in LP2–LP3 statt erst in LP5.</text>
</svg>
